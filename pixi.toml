[workspace]
authors = ["cc <cctom@umich.edu>"]
channels = ["conda-forge", "https://conda.anaconda.org/nvidia"]
name = "tea"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[dependencies]
uv = ">=0.10.2,<0.11"
python = "3.12.*"
gtest = ">=1.17.0,<2"
pycapnp = ">=2.0.0,<3"
capnproto = ">=1.0.0,<2"
cbor2 = ">=5.7.1,<6"
protobuf = ">=6.31.1,<7"
filelock = ">=3.20.0,<4"
cuda-toolkit = { version = "12.8.*", channel = "nvidia" }
cuda-version = ">=12.8,<13"
ffmpeg = "<8"
libva-utils = ">=2.23.0,<3"
