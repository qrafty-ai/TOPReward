defaults:
  - dataset: nyudoor
  - data_loader: huggingface
  - model: gemini
  - mapper: gemini
  - prompts: default
  - prompt_phrases: default
  - mapping_prompts: default
  - _self_

seed: 42          # Global seed (propagated to loader & any RNG-dependent logic)
shuffle: true       # Whether to shuffle frame presentation order
sampling_method: random  # Frame sampling method: 'random', 'uniform', 'gauss', 'heavy_left_tail', 'heavy_right_tail'
anchoring: first   # Anchoring method for frame sampling: 'first', 'last', 'middle'
# Anchoring not applied for method 'topreward'

dataset:
  num_context_episodes: 0  # How many in-context episodes to provide (gvl only)

prediction:
  method: gvl              # Prediction method: 'gvl' (task completion %) or 'topreward' (log-likelihood)
  num_examples: 20         # How many FewShotInput predictions to perform
  eval_all_episodes: false # If true, override num_examples with total episodes loaded by the data loader
  save_raw: true           # Whether to dump raw model outputs
  output_dir: ${hydra:run.dir}
  temperature: 0           # Sampling temperature for generation (gvl only)
  resume_from_index: null  # Resume from this global index (0-based), reducing effective num_examples
  resume_from_path: null   # Append to an existing predictions JSONL (relative to output_dir if not absolute)

  # TOPReward-specific options:
  reduction: mean          # Reduction for TOPReward: 'mean' or 'sum'
  use_video_description: true  # If true, generate trajectory description before computing reward

mapper:
  max_new_tokens: 1024
  temperature: 0.75
  retries: 3
  mapping_prompt: ${mapping_prompts}

hydra:
  mode: MULTIRUN # comment this if you don't want to sweep
  run:
    dir: results/
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}-predict
    subdir: ${hydra.job.num}
  sweeper:
    params:
      dataset.num_context_episodes: 0
